name: CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [unlabeled, opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      bcube_branch:
        description: "Optional Bcube branch to use for tests"
        required: false
        default: ""
  issue_comment:
    types: [created, edited]

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request != null
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    env:
      BCUBE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bcube_branch || '' }}
    strategy:
      matrix:
        version:
          - "1.10"
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: "true"
          ref: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.event_name == 'pull_request' && github.head_ref || github.ref }}
      - name: Set BCube branch from PR comment
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          if [[ "$COMMENT_BODY" =~ ^/bcube-branch[[:space:]]+(.+) ]]; then
            echo "BCUBE_BRANCH=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          fi
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: Install dependencies
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile();'
      - uses: julia-actions/julia-runtest@latest
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          file: lcov.info
